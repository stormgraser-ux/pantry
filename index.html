<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="description" content="Shared household grocery & meal planning" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pantry" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <title>Pantry</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- iOS Install Banner -->
  <div id="ios-banner" style="display:none">
    <span>📲 Tap Share → Add to Home Screen to install</span>
    <button id="ios-banner-dismiss" aria-label="Dismiss">×</button>
  </div>

  <!-- Clear-checked bar (list view only) -->
  <div id="clear-checked-bar">
    <span class="label">0 items checked</span>
    <button id="clear-checked-btn" class="btn btn-danger" style="padding:6px 14px;font-size:13px">Clear checked</button>
  </div>

  <!-- App shell -->
  <div id="app">
    <!-- Views -->
    <div id="view-list" class="view active"></div>
    <div id="view-pantry" class="view"></div>
    <div id="view-meals" class="view"></div>
    <div id="view-settings" class="view"></div>

    <!-- Bottom Nav -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-view="list">
        <span class="nav-icon">🛒</span>
        <span>List</span>
      </button>
      <button class="nav-btn" data-view="pantry">
        <span class="nav-icon">🏪</span>
        <span>Pantry</span>
      </button>
      <button class="nav-btn" data-view="meals">
        <span class="nav-icon">🍽️</span>
        <span>Meals</span>
      </button>
      <button class="nav-btn" data-view="settings">
        <span class="nav-icon">⚙️</span>
        <span>Settings</span>
      </button>
    </nav>
  </div>

  <!-- FABs -->
  <button id="list-fab" class="fab" aria-label="Add to list" style="display:flex">+</button>
  <button id="pantry-fab" class="fab" aria-label="Add pantry item" style="display:none">+</button>

  <!-- Bottom sheets (portals) -->
  <div class="sheet-backdrop" id="add-sheet-backdrop"></div>
  <div class="sheet-backdrop" id="pantry-add-sheet"></div>
  <div class="sheet-backdrop" id="pantry-section-sheet"></div>
  <div class="sheet-backdrop" id="meals-add-sheet"></div>
  <div class="sheet-backdrop" id="settings-add-sheet"></div>

  <!-- Toast -->
  <div id="toast" role="status" aria-live="polite"></div>

  <!-- App entry -->
  <script type="module" src="app.js"></script>
</body>
</html>
